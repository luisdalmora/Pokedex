<!doctype html>
<html lang="en">
<head>

  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

        <svg fill="currentColor" width="30" height="30" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8 0-1.89.66-3.6 1.76-4.96C8.2 9.54 10 10.5 12 10.5s3.8-.96 6.24-3.46C19.34 8.4 20 10.11 20 12c0 4.41-3.59 8-8 8zm0-9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>

</html>
